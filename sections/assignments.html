<style>
  /* إخفاء الأعمدة في الشاشات الصغيرة */
  @media (max-width: 768px) {
    .col-hide-mobile { display: none !important; }
  }

  .overload-warning {
    display: none;
    background: rgba(221,107,32,0.08);
    border: 1px dashed var(--brand-warning);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--brand-warning);
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.3s ease;
  }
  .overload-warning.active { display: flex; }
</style>

<div class="page-header-row fade-in">
  <div class="page-header">
    <div class="page-title">📋 إسناد المهام للمعلمين</div>
    <div class="page-subtitle">ربط المعلمين بالمواد والفصول (الخطوة الأساسية لإنشاء الجداول)</div>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-primary btn-sm" onclick="openAddAssignmentModal()">
      <i class="fas fa-link"></i> إسناد مادة لمعلم
    </button>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi-card blue fade-in fade-in-delay-1">
    <div class="kpi-top">
      <div class="kpi-icon blue"><i class="fas fa-tasks"></i></div>
    </div>
    <div class="kpi-value" id="kpi-total">0</div>
    <div class="kpi-label">إجمالي الإسنادات</div>
  </div>
  <div class="kpi-card green fade-in fade-in-delay-2">
    <div class="kpi-top">
      <div class="kpi-icon green"><i class="fas fa-chalkboard-teacher"></i></div>
    </div>
    <div class="kpi-value" id="kpi-teachers">0</div>
    <div class="kpi-label">معلمين بمهام</div>
  </div>
  <div class="kpi-card orange fade-in fade-in-delay-3">
    <div class="kpi-top">
      <div class="kpi-icon orange"><i class="fas fa-layer-group"></i></div>
    </div>
    <div class="kpi-value" id="kpi-classes">0</div>
    <div class="kpi-label">فصول مُغطاة</div>
  </div>
</div>

<div class="card data-table-card fade-in">
  <div class="card-header">
    <div class="table-controls" style="width: 100%;">
      <select id="filter-teacher" class="filter-select" style="flex: 1;" onchange="renderAssignmentsTable()">
        <option value="">جميع المعلمين</option>
      </select>
      <select id="filter-class" class="filter-select" style="flex: 1;" onchange="renderAssignmentsTable()">
        <option value="">جميع الفصول</option>
      </select>
      <select id="filter-subject" class="filter-select" style="flex: 1;" onchange="renderAssignmentsTable()">
        <option value="">جميع المواد</option>
      </select>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table" id="assignments-table">
      <thead>
        <tr>
          <th>المعلم</th>
          <th>المادة</th>
          <th>الفصل</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody id="assignments-tbody">
        <tr><td colspan="4" style="text-align:center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> جاري جلب البيانات...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal الإضافة -->
<div class="modal-overlay" id="modal-add-assignment">
  <div class="modal" style="max-width: 500px;">
    <div class="modal-header">
      <div class="modal-title">📋 إسناد مادة لمعلم</div>
      <button class="modal-close" onclick="closeModal('modal-add-assignment')"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="form-group">
      <label class="form-label">اختر المعلم *</label>
      <select class="form-select" id="na-teacher" required>
        <option value="">-- جاري التحميل... --</option>
      </select>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">المادة *</label>
        <select class="form-select" id="na-subject" required>
          <option value="">-- جاري التحميل... --</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">الفصل *</label>
        <select class="form-select" id="na-class" required>
          <option value="">-- جاري التحميل... --</option>
        </select>
      </div>
    </div>

    <!-- رسالة تحذير مخفية تظهر عند التعارض -->
    <div id="conflict-warning" style="display: none; background: rgba(229,62,62,0.1); color: var(--brand-danger); padding: 10px; border-radius: 4px; font-size: 12px; margin-bottom: 12px;">
      <i class="fas fa-exclamation-triangle"></i> هذه المادة مسندة بالفعل لهذا الفصل! لا يمكن تكرار إسناد نفس المادة في نفس الفصل لمعلم آخر.
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitNewAssignment()">
        <i class="fas fa-check"></i> تأكيد الإسناد
      </button>
      <button class="btn btn-ghost" onclick="closeModal('modal-add-assignment')">إلغاء</button>
    </div>
  </div>
</div>

<script>
  let assignData = {
      assignments: [],
      teachers: {},
      subjects: {},
      classes: {},
      users: {}
  };

  async function initAssignmentsSection() {
      if (typeof AppConfig === 'undefined') return;

      try {
          // جلب كل البيانات اللازمة للربط
          const [assignRes, teachRes, subRes, classRes, userRes] = await Promise.all([
              AppConfig.get('teacher_assignments').catch(() => []), // تعيينات المعلمين
              AppConfig.get('teachers').catch(() => []),           // المعلمون
              AppConfig.get('subjects').catch(() => []),           // المواد التي أضفتها
              AppConfig.get('classes').catch(() => []),            // الفصول
              AppConfig.get('users').catch(() => [])               // أسماء المستخدمين للمعلمين
          ]);

          assignData.assignments = Array.isArray(assignRes) ? assignRes.reverse() : [];
          
          if(Array.isArray(teachRes)) assignData.teachers = teachRes.reduce((acc, t) => ({...acc, [t.id]: t}), {});
          if(Array.isArray(subRes)) assignData.subjects = subRes.reduce((acc, s) => ({...acc, [s.id]: s}), {});
          if(Array.isArray(classRes)) assignData.classes = classRes.reduce((acc, c) => ({...acc, [c.id]: c}), {});
          if(Array.isArray(userRes)) assignData.users = userRes.reduce((acc, u) => ({...acc, [u.id]: u}), {});

          calculateKPIs();
          populateDropdowns();
          renderAssignmentsTable();

      } catch (error) {
          console.error("Error loading assignments:", error);
          document.getElementById('assignments-tbody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:red;">حدث خطأ في الاتصال بالخادم</td></tr>';
      }
  }

  function calculateKPIs() {
      document.getElementById('kpi-total').innerText = assignData.assignments.length;

      const uniqueTeachers = new Set(assignData.assignments.map(a => a.teacher_id));
      document.getElementById('kpi-teachers').innerText = uniqueTeachers.size;

      const uniqueClasses = new Set(assignData.assignments.map(a => a.class_id));
      document.getElementById('kpi-classes').innerText = uniqueClasses.size;
  }

  function getTeacherName(teacherId) {
      const teacher = assignData.teachers[teacherId];
      if (!teacher) return 'معلم غير معروف';
      const user = assignData.users[teacher.user_id];
      return user ? user.full_name : 'معلم بدون اسم';
  }

  function getSubjectName(subjectId) {
      const sub = assignData.subjects[subjectId];
      return sub ? sub.subject_name : 'مادة محذوفة';
  }

  function getClassName(classId) {
      const cls = assignData.classes[classId];
      return cls ? cls.class_name : 'فصل محذوف';
  }

  function populateDropdowns() {
      // 1. فلاتر الجدول
      const filterT = document.getElementById('filter-teacher');
      const filterC = document.getElementById('filter-class');
      const filterS = document.getElementById('filter-subject');

      filterT.innerHTML = '<option value="">جميع المعلمين</option>';
      Object.values(assignData.teachers).forEach(t => {
          filterT.innerHTML += `<option value="${t.id}">${getTeacherName(t.id)}</option>`;
      });

      filterC.innerHTML = '<option value="">جميع الفصول</option>';
      Object.values(assignData.classes).forEach(c => {
          filterC.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
      });

      filterS.innerHTML = '<option value="">جميع المواد</option>';
      Object.values(assignData.subjects).forEach(s => {
          filterS.innerHTML += `<option value="${s.id}">${s.subject_name}</option>`;
      });

      // 2. قوائم نافذة الإضافة المنسدلة
      const naTeacher = document.getElementById('na-teacher');
      const naSubject = document.getElementById('na-subject');
      const naClass = document.getElementById('na-class');

      naTeacher.innerHTML = '<option value="">-- اختر المعلم --</option>';
      Object.values(assignData.teachers).forEach(t => {
          naTeacher.innerHTML += `<option value="${t.id}">${getTeacherName(t.id)} (${t.specialty || 'عام'})</option>`;
      });

      naSubject.innerHTML = '<option value="">-- اختر المادة --</option>';
      Object.values(assignData.subjects).forEach(s => {
          naSubject.innerHTML += `<option value="${s.id}">${s.subject_name}</option>`;
      });

      naClass.innerHTML = '<option value="">-- اختر الفصل --</option>';
      Object.values(assignData.classes).forEach(c => {
          naClass.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
      });
  }

  function renderAssignmentsTable() {
      const tbody = document.getElementById('assignments-tbody');
      tbody.innerHTML = '';

      const tFilter = document.getElementById('filter-teacher').value;
      const cFilter = document.getElementById('filter-class').value;
      const sFilter = document.getElementById('filter-subject').value;

      const filtered = assignData.assignments.filter(a => {
          return (tFilter === "" || String(a.teacher_id) === tFilter) &&
                 (cFilter === "" || String(a.class_id) === cFilter) &&
                 (sFilter === "" || String(a.subject_id) === sFilter);
      });

      if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا توجد إسنادات مطابقة. استخدم زر "إسناد جديد".</td></tr>';
          return;
      }

      filtered.forEach(assign => {
          const tName = getTeacherName(assign.teacher_id);
          const sName = getSubjectName(assign.subject_id);
          const cName = getClassName(assign.class_id);

          const tr = document.createElement('tr');
          tr.innerHTML = `
              <td><strong><i class="fas fa-user-tie" style="color:var(--brand-primary); margin-left:6px;"></i> ${tName}</strong></td>
              <td><span class="badge badge-info">${sName}</span></td>
              <td>${cName}</td>
              <td>
                <div class="action-btns">
                  <button class="action-btn delete" title="حذف الإسناد" onclick="deleteAssignment(${assign.id})"><i class="fas fa-trash"></i></button>
                </div>
              </td>
          `;
          tbody.appendChild(tr);
      });
  }

  function openAddAssignmentModal() {
      document.getElementById('conflict-warning').style.display = 'none';
      document.getElementById('na-teacher').value = '';
      document.getElementById('na-subject').value = '';
      document.getElementById('na-class').value = '';
      openModal('modal-add-assignment');
  }

  async function submitNewAssignment() {
      const teacherId = document.getElementById('na-teacher').value;
      const subjectId = document.getElementById('na-subject').value;
      const classId = document.getElementById('na-class').value;
      const warning = document.getElementById('conflict-warning');

      warning.style.display = 'none';

      if (!teacherId || !subjectId || !classId) {
          alert("الرجاء اختيار المعلم والمادة والفصل.");
          return;
      }

      // فحص التعارض: هل تم إسناد هذه المادة مسبقاً في هذا الفصل؟
      const conflict = assignData.assignments.find(a => 
          String(a.subject_id) === subjectId && String(a.class_id) === classId
      );

      if (conflict) {
          warning.style.display = 'block';
          return; // إيقاف العملية
      }

      const payload = {
          teacher_id: parseInt(teacherId),
          subject_id: parseInt(subjectId),
          class_id: parseInt(classId)
      };

      // نقطة النهاية (Endpoint) هي teacher_assignments بناءً على ملف الجداول
      const res = await AppConfig.post('teacher_assignments/', payload);

      if (res) {
          if(typeof showToast === 'function') showToast('تم الإسناد بنجاح', 'success');
          closeModal('modal-add-assignment');
          initAssignmentsSection(); 
      } else {
          alert("❌ حدث خطأ أثناء الحفظ. تأكد من اتصال الخادم.");
      }
  }

  async function deleteAssignment(id) {
      if (!confirm("⚠️ تحذير: إذا حذفت هذا الإسناد، سيتم حذف جميع الحصص المرتبطة به في الجداول الأسبوعية لهذا الفصل تلقائياً. هل أنت متأكد؟")) return;

      const res = await AppConfig.delete('teacher_assignments', id);
      
      if (res) {
          if(typeof showToast === 'function') showToast('تم حذف الإسناد بنجاح', 'success');
          initAssignmentsSection();
      } else {
          alert("تعذر الحذف.");
      }
  }

  // تشغيل التهيئة
  setTimeout(initAssignmentsSection, 100);
</script>
