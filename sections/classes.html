<style>
  /* تنسيقات شبكة الفصول (Card Grid) */
  .classes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  
  .class-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 24px;
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-sm);
  }
  .class-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
    border-color: var(--brand-primary);
  }
  
  .class-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .class-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
  .class-level { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
  
  .class-capacity-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  
  .class-progress { margin-bottom: 6px; height: 8px; border-radius: 4px; overflow: hidden; background: var(--bg-surface-2); }
  .class-progress-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  
  /* ألوان الحالات */
  .status-safe .class-progress-bar { background: var(--brand-success); }
  .status-safe .capacity-text { color: var(--brand-success); }
  
  .status-warning .class-progress-bar { background: var(--brand-warning); }
  .status-warning .capacity-text { color: var(--brand-warning); }
  
  .status-full .class-progress-bar { background: var(--brand-danger); }
  .status-full .capacity-text { color: var(--brand-danger); }
  .status-full { background: rgba(229,62,62,0.02); border-color: rgba(229,62,62,0.2); }

  .class-seats-text { font-size: 11px; color: var(--text-secondary); text-align: left; margin-bottom: 20px; }
  
  .class-actions { display: flex; gap: 8px; margin-top: auto; }
</style>

<div class="page-header-row fade-in">
  <div class="page-header">
    <div class="page-title">🏫 إدارة الفصول الدراسية</div>
    <div class="page-subtitle">مراقبة سعة الفصول والطلاب المسجّلين وتوزيعهم</div>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-primary btn-sm" onclick="openAddClassModal()">
      <i class="fas fa-plus"></i> فصل جديد
    </button>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi-card blue fade-in fade-in-delay-1">
    <div class="kpi-top">
      <div class="kpi-icon blue"><i class="fas fa-chalkboard"></i></div>
    </div>
    <div class="kpi-value" id="kpi-total-classes">0</div>
    <div class="kpi-label">إجمالي الفصول</div>
  </div>
  <div class="kpi-card green fade-in fade-in-delay-2">
    <div class="kpi-top">
      <div class="kpi-icon green"><i class="fas fa-user-graduate"></i></div>
    </div>
    <div class="kpi-value" id="kpi-total-enrolled">0</div>
    <div class="kpi-label">طلاب موزعين على الفصول</div>
  </div>
  <div class="kpi-card red fade-in fade-in-delay-3">
    <div class="kpi-top">
      <div class="kpi-icon red"><i class="fas fa-door-closed"></i></div>
    </div>
    <div class="kpi-value" id="kpi-full-classes">0</div>
    <div class="kpi-label">فصول ممتلئة</div>
  </div>
  <div class="kpi-card orange fade-in fade-in-delay-4">
    <div class="kpi-top">
      <div class="kpi-icon orange"><i class="fas fa-chair"></i></div>
    </div>
    <div class="kpi-value" id="kpi-available-seats">0</div>
    <div class="kpi-label">مقعد شاغر (متاح)</div>
  </div>
</div>

<div class="card fade-in" style="margin-bottom: 24px; padding: 12px 20px;">
  <div class="table-controls" style="margin: 0; border: none; padding: 0; background: transparent;">
    <div class="search-input-wrap" style="flex: 2;">
      <i class="fas fa-search"></i>
      <input type="text" id="classes-search" class="search-input" placeholder="بحث باسم الفصل..." onkeyup="filterClasses()">
    </div>
  </div>
</div>

<div class="classes-grid fade-in" id="classes-grid-container">
  <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted);">
    <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>جاري جلب الفصول...
  </div>
</div>

<div class="modal-overlay" id="modal-add-class">
  <div class="modal" style="max-width: 550px;">
    <div class="modal-header">
      <div class="modal-title">🏫 إضافة فصل جديد</div>
      <button class="modal-close" onclick="closeModal('modal-add-class')"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="form-group">
      <label class="form-label">اسم الفصل *</label>
      <input type="text" id="nc-name" class="form-input" placeholder="مثال: الفصل الأول (أ)" required>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">المستوى الدراسي</label>
        <input type="text" id="nc-level" class="form-input" placeholder="مثال: مستوى أول - ابتدائي">
      </div>
      <div class="form-group">
        <label class="form-label">الفئة العمرية (اختياري)</label>
        <select id="nc-age-group" class="form-select">
          <option value="">-- غير محدد --</option>
          <option value="Bebe">رضع (Bebe)</option>
          <option value="Pitsection">قسم صغير (Pitsection)</option>
          <option value="MyenSection">قسم متوسط (MyenSection)</option>
          <option value="GandSection">قسم كبير (GandSection)</option>
          <option value="SchoolAge">في سن التمدرس (SchoolAge)</option>
        </select>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">الفرع *</label>
        <select id="nc-branch-id" class="form-select" required>
          <option value="">-- اختر الفرع --</option>
        </select>
      </div>
      <div class="form-group" style="background: rgba(43,108,176,0.05); border: 1px dashed var(--brand-info); padding: 12px; border-radius: var(--radius-md);">
        <label class="form-label" style="color: var(--brand-info); margin-bottom: 4px;">الطاقة الاستيعابية *</label>
        <input type="number" id="nc-capacity" class="form-input" placeholder="مثال: 30" min="5" max="100" required>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitNewClass()">
        <i class="fas fa-save"></i> إنشاء الفصل
      </button>
      <button class="btn btn-ghost" onclick="closeModal('modal-add-class')">إلغاء</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-class-students">
  <div class="modal" style="max-width: 750px; width: 95%;">
    <div class="modal-header">
      <div class="modal-title" id="modal-class-students-title">👨‍🎓 قائمة طلاب الفصل</div>
      <button class="modal-close" onclick="closeModal('modal-class-students')"><i class="fas fa-times"></i></button>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div style="font-size: 13px; color: var(--text-secondary);" id="modal-class-students-subtitle">
        جاري التحميل...
      </div>
      <button class="btn btn-ghost btn-sm" onclick="showToast('جاري تصدير القائمة...', 'info')">
        <i class="fas fa-file-excel"></i> تصدير القائمة
      </button>
    </div>

    <div class="table-wrapper" style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border-subtle);">
      <table class="data-table" style="font-size: 12px;">
        <thead style="position: sticky; top: 0; z-index: 1;">
          <tr>
            <th>رقم الطالب</th>
            <th>الاسم الكامل</th>
            <th>تاريخ التسجيل</th>
            <th>الحالة</th>
          </tr>
        </thead>
        <tbody id="class-students-tbody">
          </tbody>
      </table>
    </div>
    
    <div class="modal-footer" style="margin-top: 20px;">
      <button class="btn btn-ghost" onclick="closeModal('modal-class-students')">إغلاق</button>
    </div>
  </div>
</div>

<script>
  let classesPageData = {
      classes: [],
      students: [],
      users: {},
      branches: {}
  };

  async function initClassesSection() {
      if (typeof AppConfig === 'undefined') {
          document.getElementById('classes-grid-container').innerHTML = '<div style="color:red; text-align:center; padding:20px;">خطأ: ملف الاتصال بالخادم مفقود</div>';
          return;
      }

      try {
          // جلب البيانات من الـ APIs
          const [classesRes, studentsRes, usersRes, branchesRes] = await Promise.all([
              AppConfig.get('classes'),
              AppConfig.get('students'),
              AppConfig.get('users'),
              AppConfig.get('branches')
          ]);

          classesPageData.classes = classesRes || [];
          classesPageData.students = studentsRes || [];
          classesPageData.users = (usersRes || []).reduce((acc, u) => ({...acc, [u.id]: u}), {});
          classesPageData.branches = (branchesRes || []).reduce((acc, b) => ({...acc, [b.id]: b}), {});

          calculateClassesKPIs();
          populateBranchesDropdown();
          renderClassesGrid(classesPageData.classes);

      } catch (error) {
          console.error("Error loading classes data:", error);
      }
  }

  // حساب المؤشرات (KPIs)
  function calculateClassesKPIs() {
      const totalClasses = classesPageData.classes.length;
      let totalEnrolled = 0;
      let fullClassesCount = 0;
      let availableSeatsCount = 0;

      // حساب عدد الطلاب المسجلين لكل فصل
      let studentsPerClass = {};
      classesPageData.students.forEach(s => {
          if (s.class_id && s.status === 'Active') {
              studentsPerClass[s.class_id] = (studentsPerClass[s.class_id] || 0) + 1;
              totalEnrolled++;
          }
      });

      classesPageData.classes.forEach(cls => {
          const capacity = cls.capacity || 0;
          const enrolled = studentsPerClass[cls.id] || 0;
          
          if (capacity > 0 && enrolled >= capacity) {
              fullClassesCount++;
          }
          if (capacity > enrolled) {
              availableSeatsCount += (capacity - enrolled);
          }
      });

      document.getElementById('kpi-total-classes').innerText = totalClasses;
      document.getElementById('kpi-total-enrolled').innerText = totalEnrolled;
      document.getElementById('kpi-full-classes').innerText = fullClassesCount;
      document.getElementById('kpi-available-seats').innerText = availableSeatsCount;
  }

  // رسم شبكة الكروت (Cards)
  function renderClassesGrid(classesArray) {
      const container = document.getElementById('classes-grid-container');
      container.innerHTML = '';

      if (classesArray.length === 0) {
          container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted);">لا توجد فصول دراسية مضافة حتى الآن.</div>';
          return;
      }

      classesArray.forEach(cls => {
          // حساب عدد طلاب هذا الفصل
          const enrolled = classesPageData.students.filter(s => s.class_id === cls.id && s.status === 'Active').length;
          const capacity = cls.capacity || 0;
          
          let percentage = 0;
          if (capacity > 0) percentage = Math.min(Math.round((enrolled / capacity) * 100), 100);

          // تحديد حالة ولون الفصل
          let statusClass = 'status-safe';
          let statusBadge = '<span class="badge badge-success">متاح</span>';
          
          if (percentage >= 100) {
              statusClass = 'status-full';
              statusBadge = '<span class="badge badge-danger">ممتلئ</span>';
          } else if (percentage >= 85) {
              statusClass = 'status-warning';
              statusBadge = '<span class="badge badge-warning">شبه ممتلئ</span>';
          }

          const card = document.createElement('div');
          card.className = `class-card ${statusClass}`;
          card.innerHTML = `
              <div class="class-header">
                <div class="class-title">${cls.class_name}</div>
                ${statusBadge}
              </div>
              <div class="class-level"><i class="fas fa-layer-group"></i> ${cls.level || 'مستوى غير محدد'}</div>
              
              <div class="class-capacity-info">
                <span>نسبة الإشغال</span>
                <span class="capacity-text">${percentage}%</span>
              </div>
              <div class="class-progress"><div class="class-progress-bar" style="width: ${percentage}%;"></div></div>
              <div class="class-seats-text">${enrolled} / ${capacity || '؟'} مقعد</div>
              
              <div class="class-actions">
                <button class="btn btn-ghost btn-sm" style="flex: 1;" onclick="viewClassStudents(${cls.id}, '${cls.class_name}', ${enrolled}, ${capacity})"><i class="fas fa-users"></i> قائمة الطلاب</button>
              </div>
          `;
          container.appendChild(card);
      });
  }

  function filterClasses() {
      const searchVal = document.getElementById('classes-search').value.toLowerCase();
      const filtered = classesPageData.classes.filter(cls => 
          cls.class_name.toLowerCase().includes(searchVal) || 
          (cls.level && cls.level.toLowerCase().includes(searchVal))
      );
      renderClassesGrid(filtered);
  }

  function populateBranchesDropdown() {
      const branchSelect = document.getElementById('nc-branch-id');
      branchSelect.innerHTML = '<option value="">-- اختر الفرع --</option>';
      Object.values(classesPageData.branches).forEach(b => {
          branchSelect.innerHTML += `<option value="${b.id}">${b.branch_name}</option>`;
      });
  }

  function openAddClassModal() {
      openModal('modal-add-class');
  }

  // إرسال POST لإضافة فصل جديد
  async function submitNewClass() {
      const payload = {
          class_name: document.getElementById('nc-name').value,
          level: document.getElementById('nc-level').value || null,
          age_group: document.getElementById('nc-age-group').value || null,
          branch_id: parseInt(document.getElementById('nc-branch-id').value) || null,
          capacity: parseInt(document.getElementById('nc-capacity').value) || null
      };

      if (!payload.class_name || !payload.capacity) {
          alert("يرجى إدخال اسم الفصل والطاقة الاستيعابية!");
          return;
      }

      const result = await AppConfig.post('classes/', payload);
      
      if (result !== null) {
          if(typeof showToast === 'function') showToast('تم إنشاء الفصل بنجاح', 'success');
          closeModal('modal-add-class');
          initClassesSection(); // تحديث الواجهة
      } else {
          alert("حدث خطأ أثناء الإنشاء، راجع الكونسول.");
      }
  }

  // عرض نافذة طلاب الفصل (Modal)
  function viewClassStudents(classId, className, enrolled, capacity) {
      document.getElementById('modal-class-students-title').innerText = `👨‍🎓 قائمة طلاب الفصل: ${className}`;
      document.getElementById('modal-class-students-subtitle').innerHTML = `إجمالي الطلاب النشطين: <strong style="color: var(--text-primary);">${enrolled} طالب</strong> من أصل ${capacity || '?'} مقعد.`;
      
      const tbody = document.getElementById('class-students-tbody');
      tbody.innerHTML = '';

      // جلب طلاب هذا الفصل
      const classStudents = classesPageData.students.filter(s => s.class_id === classId);

      if (classStudents.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">لا يوجد طلاب مسجلين في هذا الفصل حتى الآن.</td></tr>';
      } else {
          classStudents.forEach(student => {
              const user = classesPageData.users[student.user_id] || {};
              const regDate = student.registration_date ? student.registration_date.split('T')[0] : '-';
              const statusBadge = student.status === 'Active' 
                  ? '<span class="badge badge-success">نشط</span>' 
                  : '<span class="badge badge-warning">موقوف/منسحب</span>';

              const tr = document.createElement('tr');
              if (student.status !== 'Active') tr.style.opacity = '0.6';
              
              tr.innerHTML = `
                  <td style="font-family: monospace; font-weight: 700;">STU-${student.id}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div class="avatar avatar-blue" style="width:24px;height:24px;font-size:10px">${getInitials(user.full_name)}</div>
                      <strong>${user.full_name || 'غير محدد'}</strong>
                    </div>
                  </td>
                  <td>${regDate}</td>
                  <td>${statusBadge}</td>
              `;
              tbody.appendChild(tr);
          });
      }

      openModal('modal-class-students');
  }

  function getInitials(name) {
      if (!name) return '؟؟';
      const parts = name.trim().split(' ');
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.substring(0, 2).toUpperCase();
  }

  // تشغيل التهيئة فوراً
  setTimeout(initClassesSection, 100);
</script>
