<div class="page-header-row fade-in">
  <div class="page-header">
    <div class="page-title">🏢 إدارة الفروع</div>
    <div class="page-subtitle">إدارة فروع المؤسسة ومواقعها</div>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-primary btn-sm" onclick="openAddBranchModal()">
      <i class="fas fa-plus"></i> فرع جديد
    </button>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi-card blue fade-in fade-in-delay-1">
    <div class="kpi-top">
      <div class="kpi-icon blue"><i class="fas fa-building"></i></div>
    </div>
    <div class="kpi-value" id="kpi-total-branches">0</div>
    <div class="kpi-label">إجمالي الفروع</div>
  </div>
  <div class="kpi-card green fade-in fade-in-delay-2">
    <div class="kpi-top">
      <div class="kpi-icon green"><i class="fas fa-map-marker-alt"></i></div>
    </div>
    <div class="kpi-value" id="kpi-main-branches">0</div>
    <div class="kpi-label">فروع رئيسية</div>
  </div>
  <div class="kpi-card orange fade-in fade-in-delay-3">
    <div class="kpi-top">
      <div class="kpi-icon orange"><i class="fas fa-user-graduate"></i></div>
    </div>
    <div class="kpi-value">-</div>
    <div class="kpi-label">إجمالي الطلاب (قريباً)</div>
  </div>
  <div class="kpi-card fade-in fade-in-delay-4" style="border-right: 4px solid var(--text-muted)">
    <div class="kpi-top">
      <div class="kpi-icon" style="background:var(--bg-base); color:var(--text-muted)"><i class="fas fa-users"></i></div>
    </div>
    <div class="kpi-value">-</div>
    <div class="kpi-label">إجمالي الموظفين (قريباً)</div>
  </div>
</div>

<div class="card data-table-card fade-in">
  <div class="card-header">
    <div class="table-controls" style="width: 100%;">
      <div class="search-input-wrap" style="flex: 2;">
        <i class="fas fa-search"></i>
        <input type="text" id="branches-search" class="search-input" placeholder="بحث باسم الفرع أو العنوان..." onkeyup="filterBranches()">
      </div>
      <select id="branches-filter-type" class="filter-select" onchange="filterBranches()">
        <option value="">جميع الأنواع</option>
        <option value="رئيسي">رئيسي</option>
        <option value="فرعي">فرعي</option>
        <option value="إداري">إداري</option>
      </select>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table" id="branches-table">
      <thead>
        <tr>
          <th># الكود</th>
          <th>اسم الفرع</th>
          <th>نوع الفرع</th>
          <th>الموقع / العنوان</th>
          <th style="text-align: center;">الإجراءات</th>
        </tr>
      </thead>
      <tbody id="branches-tbody">
        <tr><td colspan="5" style="text-align:center; padding:30px;"><i class="fas fa-spinner fa-spin"></i> جاري جلب الفروع...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ================= Modal: إضافة فرع ================= -->
<div class="modal-overlay" id="modal-add-branch">
  <div class="modal" style="max-width: 500px;">
    <div class="modal-header">
      <div class="modal-title">🏢 إضافة فرع جديد</div>
      <button class="modal-close" onclick="closeModal('modal-add-branch')"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="form-group">
      <label class="form-label">اسم الفرع *</label>
      <input type="text" id="nb-name" class="form-input" placeholder="مثال: فرع الشمال" required>
    </div>
    
    <div class="form-group">
      <label class="form-label">نوع الفرع *</label>
      <select id="nb-type" class="form-select" required>
        <option value="">-- اختر النوع --</option>
        <option value="رئيسي">فرع رئيسي</option>
        <option value="فرعي">فرع تعليمي فرعي</option>
        <option value="إداري">مبنى إداري فقط</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">الموقع / العنوان</label>
      <textarea id="nb-location" class="form-textarea" placeholder="العنوان الكامل للفرع..." rows="3"></textarea>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitNewBranch()">
        <i class="fas fa-save"></i> حفظ الفرع
      </button>
      <button class="btn btn-ghost" onclick="closeModal('modal-add-branch')">إلغاء</button>
    </div>
  </div>
</div>

<!-- ================= Modal: تعديل فرع ================= -->
<div class="modal-overlay" id="modal-edit-branch">
  <div class="modal" style="max-width: 500px;">
    <div class="modal-header">
      <div class="modal-title">✏️ تعديل بيانات الفرع</div>
      <button class="modal-close" onclick="closeModal('modal-edit-branch')"><i class="fas fa-times"></i></button>
    </div>
    
    <input type="hidden" id="eb-id">

    <div class="form-group">
      <label class="form-label">اسم الفرع *</label>
      <input type="text" id="eb-name" class="form-input" required>
    </div>
    
    <div class="form-group">
      <label class="form-label">نوع الفرع *</label>
      <select id="eb-type" class="form-select" required>
        <option value="رئيسي">فرع رئيسي</option>
        <option value="فرعي">فرع تعليمي فرعي</option>
        <option value="إداري">مبنى إداري فقط</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">الموقع / العنوان</label>
      <textarea id="eb-location" class="form-textarea" rows="3"></textarea>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitEditBranch()">
        <i class="fas fa-save"></i> تحديث البيانات
      </button>
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-branch')">إلغاء</button>
    </div>
  </div>
</div>

<script>
  let branchesData = [];

  async function initBranchesSection() {
      if (typeof AppConfig === 'undefined') return;

      try {
          const res = await AppConfig.get('branches');
          branchesData = Array.isArray(res) ? res.reverse() : [];
          
          calculateKPIs();
          renderBranchesTable(branchesData);

      } catch (error) {
          console.error("Error loading branches:", error);
          document.getElementById('branches-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:red;">حدث خطأ أثناء الاتصال بالخادم</td></tr>';
      }
  }

  function calculateKPIs() {
      document.getElementById('kpi-total-branches').innerText = branchesData.length;
      const mainBranches = branchesData.filter(b => b.branch_type === 'رئيسي').length;
      document.getElementById('kpi-main-branches').innerText = mainBranches;
  }

  function renderBranchesTable(data) {
      const tbody = document.getElementById('branches-tbody');
      tbody.innerHTML = '';

      if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد فروع مسجلة.</td></tr>';
          return;
      }

      data.forEach(branch => {
          let typeColor = 'badge-gray';
          if (branch.branch_type === 'رئيسي') typeColor = 'badge-info';
          if (branch.branch_type === 'فرعي') typeColor = 'badge-success';

          const initials = getInitials(branch.branch_name);

          const tr = document.createElement('tr');
          tr.innerHTML = `
              <td><span style="font-family: monospace; color: var(--text-muted); font-weight: 700;">BR-${String(branch.id).padStart(3, '0')}</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="avatar avatar-blue">${initials}</div>
                  <div><strong>${branch.branch_name}</strong></div>
                </div>
              </td>
              <td><span class="badge ${typeColor}">${branch.branch_type}</span></td>
              <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${branch.location || ''}">
                  <i class="fas fa-map-marker-alt" style="color:var(--text-muted); margin-left:4px;"></i> ${branch.location || '-'}
              </td>
              <td style="text-align: center;">
                <div class="action-btns" style="justify-content: center;">
                  <button class="action-btn edit" title="تعديل" onclick="openEditBranchModal(${branch.id})"><i class="fas fa-pen"></i></button>
                  <button class="action-btn delete" title="حذف" onclick="deleteBranch(${branch.id}, '${branch.branch_name}')"><i class="fas fa-trash"></i></button>
                </div>
              </td>
          `;
          tbody.appendChild(tr);
      });
  }

  function filterBranches() {
      const query = document.getElementById('branches-search').value.toLowerCase();
      const typeFilter = document.getElementById('branches-filter-type').value;

      const filtered = branchesData.filter(b => {
          const matchName = b.branch_name.toLowerCase().includes(query) || (b.location && b.location.toLowerCase().includes(query));
          const matchType = typeFilter === "" || b.branch_type === typeFilter;
          return matchName && matchType;
      });

      renderBranchesTable(filtered);
  }

  // ================= الإضافة (POST) =================
  function openAddBranchModal() {
      document.getElementById('nb-name').value = '';
      document.getElementById('nb-type').value = '';
      document.getElementById('nb-location').value = '';
      openModal('modal-add-branch');
  }

  async function submitNewBranch() {
      const name = document.getElementById('nb-name').value.trim();
      const type = document.getElementById('nb-type').value;
      const location = document.getElementById('nb-location').value.trim();

      if (!name || !type) {
          alert("الرجاء إدخال اسم ونوع الفرع.");
          return;
      }

      const payload = {
          branch_name: name,
          branch_type: type,
          location: location || null
      };

      const res = await AppConfig.post('branches/', payload);

      if (res) {
          if(typeof showToast === 'function') showToast('تم إنشاء الفرع بنجاح', 'success');
          closeModal('modal-add-branch');
          initBranchesSection(); 
      } else {
          alert("❌ حدث خطأ أثناء إضافة الفرع.");
      }
  }

  // ================= التعديل (PUT) =================
  function openEditBranchModal(id) {
      const branch = branchesData.find(b => b.id === id);
      if (!branch) return;

      document.getElementById('eb-id').value = branch.id;
      document.getElementById('eb-name').value = branch.branch_name;
      document.getElementById('eb-type').value = branch.branch_type;
      document.getElementById('eb-location').value = branch.location || '';

      openModal('modal-edit-branch');
  }

  async function submitEditBranch() {
      const id = document.getElementById('eb-id').value;
      const name = document.getElementById('eb-name').value.trim();
      const type = document.getElementById('eb-type').value;
      const location = document.getElementById('eb-location').value.trim();

      if (!name || !type) {
          alert("الرجاء إدخال اسم ونوع الفرع.");
          return;
      }

      const payload = {
          branch_name: name,
          branch_type: type,
          location: location || null
      };

      const res = await AppConfig.put('branches', id, payload);

      if (res) {
          if(typeof showToast === 'function') showToast('تم تحديث بيانات الفرع بنجاح', 'success');
          closeModal('modal-edit-branch');
          initBranchesSection(); 
      } else {
          alert("❌ حدث خطأ أثناء التحديث.");
      }
  }

  // ================= الحذف (DELETE) =================
  async function deleteBranch(id, name) {
      if (!confirm(`هل أنت متأكد من حذف فرع "${name}" نهائياً؟\nملاحظة: تأكد من عدم وجود بيانات مرتبطة بهذا الفرع.`)) return;

      const res = await AppConfig.delete('branches', id);
      if (res) {
          if(typeof showToast === 'function') showToast('تم الحذف بنجاح', 'success');
          initBranchesSection();
      } else {
          alert("تعذر الحذف. الفرع مرتبط بسجلات أخرى في النظام.");
      }
  }

  // دالة مساعدة للحصول على الأحرف الأولى للاسم (للأيقونة)
  function getInitials(name) {
      if (!name) return 'ف';
      const parts = name.trim().split(' ');
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.substring(0, 2).toUpperCase();
  }

  // تشغيل التهيئة فوراً
  setTimeout(initBranchesSection, 100);
</script>
